<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role-Menu Mapper</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="header-card">
      <div>
        <h1>Role-Menu Mapper</h1>
        <p>Настройка пунктов меню: роли и флаги</p>
      </div>
      <div class="header-actions">
        <button id="exportMappedBtn" class="btn-primary" type="button" disabled>Экспорт результата</button>
        <details class="import-panel">
          <summary>Импорт файлов</summary>
          <div class="import-panel-content">
            <label class="file-input">Импорт результата <input id="importFile" type="file" accept=".json"></label>
            <label class="file-input">Импорт roles.json <input id="importRolesFile" type="file" accept=".json"></label>
            <label class="file-input">Импорт routes.json <input id="importRoutesFile" type="file" accept=".json"></label>
            <label class="file-input">Импорт accessInfoKeys.json <input id="importAccessKeysFile" type="file" accept=".json"></label>
          </div>
        </details>
      </div>
    </header>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Поиск: path, название, имя флага accessInfoKeys">
      </div>
      <div id="statusLine" class="status muted">Инициализация встроенных данных...</div>
      <div id="errorBox" class="error"></div>
    </section>

    <main class="workspace">
      <section class="panel pane">
        <div class="pane-title">Дерево маршрутов</div>
        <div class="row">
          <button id="expandAllBtn" type="button" disabled>Раскрыть все</button>
          <button id="collapseAllBtn" type="button" disabled>Свернуть до корня</button>
        </div>
        <div id="treeRoot" class="tree-root"></div>
      </section>
      <section class="panel pane pane--roles">
        <div class="pane-title">Роли и флаги выбранного узла</div>
        <div id="selectedMeta" class="status muted">Узел не выбран</div>
        <div class="row">
          <span class="toolbar-label">Роли:</span>
          <button id="allRolesBtn" type="button" disabled>Все роли</button>
          <button id="clearRolesBtn" type="button" disabled>Нет ролей</button>
          <span class="toolbar-label">Флаги:</span>
          <button id="allAccessBtn" type="button" disabled>Все флаги</button>
          <button id="clearAccessBtn" type="button" disabled>Нет флагов</button>
        </div>
        <div id="rolesBox" class="roles-box"></div>
      </section>
    </main>
  </div>

  <script src="./data.js"></script>
  <script src="./navbar-i18n.js"></script>
  <script src="./app.js"></script>
</body>
</html>
